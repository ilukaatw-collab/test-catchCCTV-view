<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Cesium CCTV 姿態校正工具</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        #cesiumContainer { width: 100%; height: 100%; }
        #cctvOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.5; z-index: 10; object-fit: cover; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <img id="cctvOverlay" src="https://tcnvr8.taichung.gov.tw/d9216d9c" crossorigin="anonymous">
    
    <div class="absolute top-4 right-4 z-20 w-72 bg-black/70 text-white p-4 rounded-lg">
        <h2 class="font-bold mb-2">校正控制面板</h2>
        <label>高度 (Height): <span id="vHeight">60</span>m</label><input type="range" id="sHeight" min="5" max="200" value="60" class="w-full mb-2">
        <label>偏航 (Heading): <span id="vHeading">0</span>°</label><input type="range" id="sHeading" min="0" max="360" value="0" class="w-full mb-2">
        <label>俯仰 (Pitch): <span id="vPitch">-15</span>°</label><input type="range" id="sPitch" min="-90" max="0" value="-15" class="w-full mb-2">
        <label>視角 (FOV): <span id="vFov">60</span>°</label><input type="range" id="sFov" min="30" max="120" value="60" class="w-full mb-2">
        <button id="btnExport" class="w-full bg-blue-600 mt-3 py-2 rounded">匯出 JSON 參數</button>
    </div>

    <script>
        const viewer = new Cesium.Viewer('cesiumContainer');
        const state = { height: 60, heading: 0, pitch: -15, fov: 60 };

        function update() {
            viewer.camera.setView({
                destination: Cesium.Cartesian3.fromDegrees(120.684, 24.137, state.height),
                orientation: { heading: Cesium.Math.toRadians(state.heading), pitch: Cesium.Math.toRadians(state.pitch) }
            });
            viewer.camera.frustum.fov = Cesium.Math.toRadians(state.fov);
        }

        ['Height', 'Heading', 'Pitch', 'Fov'].forEach(k => {
            document.getElementById('s'+k).oninput = (e) => {
                state[k.toLowerCase()] = parseFloat(e.target.value);
                document.getElementById('v'+k).textContent = e.target.value;
                update();
            };
        });

        document.getElementById('btnExport').onclick = () => {
            const data = JSON.stringify(state, null, 2);
            navigator.clipboard.writeText(data);
            alert("參數已複製到剪貼簿：\n" + data);
        };
        update();
    </script>
</body>
</html>
